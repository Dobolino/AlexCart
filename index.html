<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <!-- Löst das Theme synchron auf, bevor irgendetwas gemalt wird – verhindert einen
         weißen "Flash" beim App-Start, wenn der Nutzer Dunkelmodus bevorzugt/gespeichert hat. -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('alexshop-store')
          var pref = 'system'
          if (raw) {
            var parsed = JSON.parse(raw)
            pref = (parsed.state && parsed.state.settings && parsed.state.settings.theme) || 'system'
          }
          var resolved =
            pref === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : pref
          document.documentElement.dataset.theme = resolved
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', resolved === 'dark' ? '#000000' : '#f2f2f7')
        } catch (e) {
          document.documentElement.dataset.theme = 'light'
        }
        /* Standalone: innerHeight = paintbare Höhe; screen.height wäre zu groß → Nav-Clip */
        if (window.navigator.standalone) {
          document.documentElement.style.setProperty('--app-h', window.innerHeight + 'px')
        }
      })()
    </script>
    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="AlexShop" />
    <!-- `default` statt `black-translucent`: Letzteres erzeugt in iOS-Standalone
         einen Layout-Viewport ~safe-area-inset-top zu kurz; der Streifen unten
         liegt außerhalb des paintbaren Bereichs (WebKit-Bug, bestätigt am Gerät).
         Wird nur bei Neu-Installation gelesen – nach Änderung App vom Home-
         Bildschirm entfernen und neu hinzufügen. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" sizes="180x180" href="/AlexCart/icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/AlexCart/icons/icon-192.png" />
    <!-- iOS bestimmt die initiale Render-Fläche einer als Standalone-App gestarteten
         Seite anhand dieser Startbilder, nicht anhand des Web-Manifests - ohne ein
         exakt zur Gerätegröße passendes Bild kann iOS beim Start eine falsche Fläche
         annehmen (Ursache des "schwarzer Streifen unten"-Bugs in Hochformat). -->
    <link
      rel="apple-touch-startup-image"
      href="/AlexCart/splash/iphone-16-pro-max.png"
      media="(device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/AlexCart/splash/iphone-16-pro.png"
      media="(device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/AlexCart/splash/iphone-16-plus.png"
      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/AlexCart/splash/iphone-16.png"
      media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/AlexCart/splash/iphone-14-13-12.png"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/AlexCart/splash/iphone-11-pro-max-xs-max.png"
      media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/AlexCart/splash/iphone-11-xr.png"
      media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/AlexCart/splash/iphone-se.png"
      media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/png" href="/AlexCart/icons/icon-192.png" />
    <link rel="manifest" href="/AlexCart/manifest.webmanifest" />
    <title>AlexShop</title>
    <style>
      /* Kritisches Minimal-CSS für den Moment vor dem React-Mount (Theme ist durch das
         obige Script bereits korrekt gesetzt, sodass hier nie Weiß aufblitzt). */
      html[data-theme='light'] {
        background: #f2f2f7;
      }
      html[data-theme='dark'] {
        background: #000000;
      }
      #boot-skeleton {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      html[data-theme='dark'] #boot-skeleton {
        background: #000000;
      }
      html[data-theme='light'] #boot-skeleton {
        background: #f2f2f7;
      }
      #boot-skeleton svg {
        width: 48px;
        height: 48px;
        animation: boot-pulse 1.1s ease-in-out infinite;
      }
      html[data-theme='dark'] #boot-skeleton svg {
        color: #ffffff;
      }
      html[data-theme='light'] #boot-skeleton svg {
        color: #12213b;
      }
      @keyframes boot-pulse {
        0%,
        100% {
          opacity: 0.35;
          transform: scale(0.96);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }
      #boot-fallback {
        display: none;
        position: fixed;
        inset: 0;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 24px;
        text-align: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      #boot-fallback p {
        margin: 0;
        font-size: 15px;
        line-height: 1.45;
        opacity: 0.75;
      }
      #boot-fallback button {
        border: none;
        border-radius: 12px;
        padding: 12px 20px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        background: #007aff;
        color: #fff;
      }
    </style>
    <script>
      /* Wenn das JS-Bundle nicht lädt (z. B. veralteter Service Worker), nicht ewig pulsieren. */
      window.setTimeout(function () {
        var sk = document.getElementById('boot-skeleton')
        var fb = document.getElementById('boot-fallback')
        if (!sk || !fb) return
        sk.style.display = 'none'
        fb.style.display = 'flex'
      }, 8000)
    </script>
    <script type="module" crossorigin src="/AlexCart/assets/dev-DndGloa5.js"></script>
    <link rel="modulepreload" crossorigin href="/AlexCart/assets/useStore-Bc6pmPZF.js">
    <link rel="stylesheet" crossorigin href="/AlexCart/assets/dev-DzrEo0B4.css">
  <link rel="manifest" href="/AlexCart/manifest.webmanifest"></head>
  <body>
    <div id="root">
      <div id="boot-skeleton">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1" /><circle cx="20" cy="21" r="1" />
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
        </svg>
      </div>
      <div id="boot-fallback" aria-live="polite">
        <p>AlexShop konnte nicht starten.<br />Bitte einmal neu laden – oft hilft das nach einem Update.</p>
        <button type="button" onclick="location.reload()">Neu laden</button>
      </div>
    </div>
  </body>
</html>
