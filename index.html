<style>
  :root{
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --nav-height: 62px;
    --quickbar-height: 52px;
    --keyboard-offset: 0px;
    --radius-sm: 12px;
    --radius-md: 16px;
    --radius-lg: 22px;
    --radius-xl: 28px;
    --shadow-sm: 0 2px 8px rgba(0,0,0,.12);
    --shadow-md: 0 8px 24px rgba(0,0,0,.22);
    --transition: .22s cubic-bezier(.4,0,.2,1);
  }

  [data-theme="dark"]{
    --bg: #000000;
    --bg-elevated: #141414;
    --surface: #1a1a1a;
    --surface-hover: #222222;
    --header-bg: #000000;
    --header-fg: #ffffff;
    --card-bg: #e57373;
    --card-fg: #ffffff;
    --card-divider: rgba(255,255,255,.18);
    --accent: #80cbc4;
    --accent-fg: #1a3a36;
    --accent-soft: rgba(128,203,196,.18);
    --text: #ffffff;
    --text-secondary: rgba(255,255,255,.72);
    --text-muted: rgba(255,255,255,.48);
    --border: rgba(255,255,255,.1);
    --chip-bg: rgba(255,255,255,.08);
    --chip-fg: rgba(255,255,255,.85);
    --danger: #ef5350;
    --danger-soft: rgba(239,83,80,.15);
    --success: #66bb6a;
    --done-bg: rgba(255,255,255,.06);
    --input-bg: rgba(255,255,255,.95);
    --input-fg: #1b1f27;
    --input-placeholder: #8a9099;
    --nav-bg: rgba(36,42,50,.92);
    --overlay: rgba(0,0,0,.55);
    --progress-track: rgba(255,255,255,.12);
    --progress-fill: #80cbc4;
    --settings-group-bg: rgba(255,255,255,.06);
    --switch-off: rgba(255,255,255,.2);
    --switch-on: #80cbc4;
  }

  [data-theme="light"]{
    --bg: #f2f3f5;
    --bg-elevated: #ffffff;
    --surface: #ffffff;
    --surface-hover: #f7f8fa;
    --header-bg: #ffffff;
    --header-fg: #1b1f27;
    --card-bg: #ffffff;
    --card-fg: #1b1f27;
    --card-divider: #eceef2;
    --accent: #26a69a;
    --accent-fg: #ffffff;
    --accent-soft: rgba(38,166,154,.12);
    --text: #1b1f27;
    --text-secondary: #5c6370;
    --text-muted: #8a9099;
    --border: #e4e7ec;
    --chip-bg: #eef0f4;
    --chip-fg: #3d4450;
    --danger: #e53935;
    --danger-soft: rgba(229,57,53,.1);
    --success: #43a047;
    --done-bg: #f5f6f8;
    --input-bg: #ffffff;
    --input-fg: #1b1f27;
    --input-placeholder: #a0a6b0;
    --nav-bg: rgba(255,255,255,.94);
    --overlay: rgba(0,0,0,.35);
    --progress-track: #e8eaee;
    --progress-fill: #26a69a;
    --settings-group-bg: #ffffff;
    --switch-off: #d5d9e0;
    --switch-on: #26a69a;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html{
    touch-action:manipulation;
    -webkit-text-size-adjust:100%;
    text-size-adjust:100%;
  }
  html, body{
    margin:0; padding:0; height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:"SF Pro Text","SF Pro Display",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    overscroll-behavior-y:contain;
    -webkit-user-select:none; user-select:none;
  }
  input, textarea, select{ -webkit-user-select:text; user-select:text; }
  #app{ min-height:100%; display:flex; flex-direction:column; }

  .screen-header{
    padding:calc(6px + var(--safe-top)) 4px 8px;
    background:var(--header-bg);
    color:var(--header-fg);
    position:sticky; top:0; z-index:20;
  }
  .header-row{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:10px; gap:10px;
  }
  .header-actions{ display:flex; gap:8px; align-items:center; }
  .icon-btn{
    width:36px; height:36px; border-radius:50%; border:none;
    background:var(--chip-bg); color:var(--header-fg);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:transform var(--transition),background var(--transition);
  }
  .icon-btn:active{ transform:scale(.92); }
  .icon-btn svg{ width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .pill-btn{
    border:none; border-radius:20px; padding:7px 14px;
    background:var(--chip-bg); color:var(--header-fg);
    font-size:13px; font-weight:600; cursor:pointer;
    transition:transform var(--transition),background var(--transition);
  }
  .pill-btn:active{ transform:scale(.96); }
  .screen-title{
    font-family:"SF Pro Display","SF Pro Text",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    font-size:28px; font-weight:700; letter-spacing:-.4px;
    margin:0 0 2px; line-height:1.1;
  }
  .screen-subtitle{ font-size:13px; color:var(--text-muted); font-weight:500; margin:0; }

  .progress-wrap{ margin:6px 0 10px; }
  .progress-bar{
    height:4px; border-radius:2px; background:var(--progress-track); overflow:hidden;
  }
  .progress-fill{
    height:100%; background:var(--progress-fill); border-radius:2px;
    transition:width .4s cubic-bezier(.4,0,.2,1);
  }
  .progress-label{
    display:flex; justify-content:space-between; font-size:12px;
    color:var(--text-muted); margin-top:6px; font-weight:500;
  }

  .toolbar{
    display:flex; gap:8px; align-items:center; margin-bottom:14px; flex-wrap:wrap;
  }
  .toolbar .pill-btn{ font-size:12px; padding:6px 12px; }
  .toolbar .pill-btn.active{ background:var(--accent-soft); color:var(--accent); }

  main{
    flex:1; padding:0 12px;
    padding-bottom:calc(var(--nav-height) + var(--quickbar-height) + 24px + var(--safe-bottom));
    animation:fadeIn .25s ease;
    transition:padding-bottom .2s ease;
  }
  body.keyboard-open main{
    padding-bottom:calc(var(--quickbar-height) + 20px);
  }
  @keyframes fadeIn{ from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  @keyframes slideUp{ from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
  @keyframes popIn{ from{opacity:0;transform:scale(.95)} to{opacity:1;transform:none} }

  .empty-state{
    text-align:center; padding:48px 24px; animation:fadeIn .35s ease;
  }
  .empty-icon{
    width:80px; height:80px; margin:0 auto 20px; border-radius:24px;
    background:var(--chip-bg); display:flex; align-items:center; justify-content:center;
  }
  .empty-icon svg{ width:40px; height:40px; stroke:var(--text-muted); fill:none; stroke-width:1.5; }
  .empty-state h3{ font-size:18px; font-weight:600; margin:0 0 8px; color:var(--text); }
  .empty-state p{ font-size:15px; color:var(--text-muted); margin:0 0 20px; line-height:1.5; }
  .empty-actions{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }

  .category-block{ margin-bottom:32px; }
  .category-block:last-child{ margin-bottom:8px; }
  .category-heading{
    font-size:16px; font-weight:600; color:var(--text);
    margin:0 0 6px 2px; letter-spacing:-.2px;
  }
  .category-block[data-tone="0"]{ --tile-bg:#c75b54; --tile-fg:#fff; }
  .category-block[data-tone="1"]{ --tile-bg:#4a7eb8; --tile-fg:#fff; }
  .category-block[data-tone="2"]{ --tile-bg:#6b8e4e; --tile-fg:#fff; }
  .category-block[data-tone="3"]{ --tile-bg:#b8863a; --tile-fg:#fff; }
  .category-block[data-tone="4"]{ --tile-bg:#7b6ba8; --tile-fg:#fff; }
  .category-block[data-tone="5"]{ --tile-bg:#4a9a9a; --tile-fg:#fff; }
  .category-block.done-section{ --tile-bg:var(--done-bg); --tile-fg:var(--text-secondary); }
  .item-tiles{
    display:flex; flex-direction:column; gap:3px;
    margin:0; padding:0; list-style:none;
  }
  .item-tile{
    border-radius:10px; overflow:hidden;
    background:var(--tile-bg, var(--card-bg));
  }
  .item-tile .row-content{
    border-radius:10px;
    background:var(--tile-bg, var(--card-bg));
  }
  .category-block .row-name,
  .category-block .row-amount{ color:var(--tile-fg, var(--card-fg)); }
  .category-block .food-icon svg{ stroke:var(--tile-fg, var(--card-fg)); }
  .category-block .check-circle{ border-color:rgba(255,255,255,.4); }
  .category-block .drag-handle{ color:var(--tile-fg, var(--card-fg)); }

  .list-card{
    background:transparent; border-radius:0;
    overflow:visible; box-shadow:none;
    animation:none; margin-bottom:0;
  }
  [data-theme="light"] .list-card{ border:none; box-shadow:none; }
  .list-card .category-section{ padding:0; }
  .list-card .category-section + .category-section{ border-top:none; padding-top:0; }
  .category-title{ display:none; }
  .category-items{ margin:0; padding:0; list-style:none; }

  .row-wrap{
    position:relative; overflow:hidden;
    border-bottom:none;
  }
  .row-actions{
    position:absolute; top:0; right:0; bottom:0;
    display:flex; align-items:stretch;
  }
  .row-action-btn{
    width:72px; border:none; color:#fff; font-size:13px; font-weight:600;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    cursor:pointer;
  }
  .row-action-btn svg{ width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:2; }
  .row-action-btn.edit{ background:#5c6bc0; }
  .row-action-btn.delete{ background:var(--danger); }
  .row-content{
    position:relative; background:var(--card-bg);
    display:flex; align-items:center; gap:10px;
    padding:11px 12px; min-height:46px;
    transition:transform .2s ease,opacity .28s ease;
    touch-action:pan-y; cursor:pointer;
    z-index:2; width:100%;
  }
  .row-content.dragging{ opacity:.5; }
  .row-content.exiting{ opacity:0; transform:scale(.97); }
  .row-content.done{ opacity:.55; }
  .drag-handle{
    width:28px; flex:none; display:flex; align-items:center; justify-content:center;
    color:var(--card-fg); opacity:.35; cursor:grab; padding-left:12px;
  }
  .drag-handle svg{ width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:2; }
  .emoji-wrap{
    width:24px; height:24px; flex:none;
    display:flex; align-items:center; justify-content:center;
  }
  .food-icon{
    width:22px; height:22px; display:flex; align-items:center; justify-content:center;
  }
  .food-icon svg{
    width:20px; height:20px; stroke:var(--card-fg); fill:none;
    stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round;
  }
  [data-theme="light"] .food-icon svg{ stroke:var(--text-secondary); }
  .emoji-wrap img.emoji{ width:22px; height:22px; }
  .row-text{ flex:1; min-width:0; }
  .row-name{
    font-size:15px; font-weight:500; line-height:1.25; color:var(--card-fg);
    transition:opacity .2s ease;
  }
  .row-amount{ font-size:12px; color:var(--card-fg); opacity:.65; margin-top:1px; }
  .row-content.done .row-name{ text-decoration:line-through; opacity:.6; }
  .check-circle{
    width:24px; height:24px; border-radius:50%;
    border:2px solid rgba(255,255,255,.4); flex:none;
    display:flex; align-items:center; justify-content:center;
    transition:background .2s ease,border-color .2s ease,transform .15s ease;
    margin-right:2px;
  }
  [data-theme="light"] .check-circle{ border-color:var(--border); }
  .row-content.done .check-circle{
    background:var(--success); border-color:var(--success);
  }
  .check-circle svg{ width:14px; height:14px; stroke:#fff; fill:none; stroke-width:3; opacity:0; transition:opacity .15s; }
  .row-content.done .check-circle svg{ opacity:1; }
  .row-menu-btn{
    width:32px; height:32px; border-radius:50%; border:none;
    background:rgba(255,255,255,.15); color:var(--card-fg);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    margin-right:8px; flex:none;
  }
  [data-theme="light"] .row-menu-btn{ background:var(--chip-bg); color:var(--text-muted); }
  .row-menu-btn svg{ width:14px; height:14px; fill:currentColor; }

  .done-toggle{
    margin:6px 0; padding:11px 14px; border-radius:10px;
    background:var(--chip-bg); display:flex; align-items:center;
    justify-content:space-between; cursor:pointer;
    font-weight:600; font-size:14px; color:var(--text-secondary);
    transition:background var(--transition);
  }
  .done-toggle:active{ background:var(--surface-hover); }
  .count-badge{
    background:var(--accent-soft); color:var(--accent);
    padding:4px 10px; border-radius:12px; font-size:12px; font-weight:600;
  }

  .chip-row{

        if(pn.length > bestLen){ best = p; bestLen = pn.length; }
      }
    }
    if(best) return best;
    const guessed = guessIconFromName(name);
    return { name: String(name||'').trim(), category:'Sonstiges', icon: guessed || 'default' };
  }

  function searchProducts(query, limit){
    const q = normalize(query);
    if(!q) return [];
    const starts = [], contains = [];
    (PRODUCT_DB?.products || []).forEach(p => {
      const n = normalize(p.name);
      if(n.startsWith(q)) starts.push(p);
      else if(n.includes(q)) contains.push(p);
    });
    return [...starts, ...contains].slice(0, limit || 8);
  }

  function iconSvg(key){
    const paths = (window.PRODUCT_ICONS || {})[key] || (window.PRODUCT_ICONS || {}).default || '';
    return `<svg viewBox="0 0 24 24">${paths}</svg>`;
  }

  function getFoodIcon(name, category, iconKey){
    let key = iconKey;
    if(!key || key === 'default') key = resolveProduct(name).icon || 'default';
    return `<span class="food-icon">${iconSvg(key)}</span>`;
  }

  const KEYS = {
    week:'alexshop_week', pantry:'alexshop_pantry', settings:'alexshop_settings',
    meta:'alexshop_meta'
  };
  const DEFAULT_CATEGORIES = window.PRODUCT_DB ? PRODUCT_DB.categories : ['Früchte & Gemüse','Milch & Käse','Fleisch & Fisch','Getreide & Beilagen','Brot & Backwaren','Tiefkühl','Getränke','Sonstiges'];
  const UNITS = ['','g','kg','ml','l','Stk','Packung','Dose','Bund'];

  function loadJSON(key, fallback){
    try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
    catch(e){ return fallback; }
  }
  function saveJSON(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){} }

  function migrateSettings(raw){
    const theme = raw.theme === 'neutral' ? 'light' : (raw.theme === 'bring' ? 'dark' : (raw.theme || 'dark'));
    return {
      theme,
      haptics: raw.haptics !== false,
      showRecent: raw.showRecent !== false,
      showFrequent: raw.showFrequent !== false
    };
  }

  const meta = loadJSON(KEYS.meta, { favorites:[], recent:[], frequent:{}, customCategories:[] });
  const state = {
    week: loadJSON(KEYS.week, { label:'', items:[] }),
    pantry: loadJSON(KEYS.pantry, defaultPantry()),
    filteredOut: [],
    settings: migrateSettings(loadJSON(KEYS.settings, { theme:'dark' })),
    meta,
    ui: {
      tab:'liste', doneOpen:false, inputQuery:'', autocompleteOpen:false, sortMode:'category',
      addPantryCategory: DEFAULT_CATEGORIES[0], listMenuOpen:false
    }
  };

  function defaultPantry(){
    const mk = (name, category) => ({ id: uid(), name, category });
    return [
      mk('Salz','Sonstiges'), mk('Pfeffer','Sonstiges'), mk('Olivenöl','Sonstiges'),
      mk('Reis','Getreide & Beilagen'), mk('Zucker','Sonstiges'), mk('Mehl','Getreide & Beilagen')
    ];
  }

  function persistWeek(){ saveJSON(KEYS.week, state.week); }
  function persistPantry(){ saveJSON(KEYS.pantry, state.pantry); }
  function persistSettings(){ saveJSON(KEYS.settings, state.settings); }
  function persistMeta(){ saveJSON(KEYS.meta, state.meta); }
  function uid(){ return Math.random().toString(36).slice(2) + Date.now().toString(36); }

  function haptic(type){
    if(!state.settings.haptics || !navigator.vibrate) return;
    navigator.vibrate(type === 'medium' ? 15 : type === 'success' ? [8, 40, 8] : 8);
  }

  function normalize(str){
    return String(str||'').toLowerCase().trim()
      .replace(/ä/g,'a').replace(/ö/g,'o').replace(/ü/g,'u').replace(/ß/g,'ss');
  }

  function parseAmount(str){
    if(!str) return { value:'', unit:'' };
    const m = String(str).trim().match(/^(\d+(?:[.,]\d+)?)\s*(.*)$/);
    if(!m) return { value:'', unit:'' };
    return { value: m[1], unit: m[2].trim() };
  }
  function formatAmount(value, unit){
    const v = String(value||'').trim();
    const u = String(unit||'').trim();
    if(!v && !u) return '';
    if(!u) return v;
    return v ? (v + ' ' + u) : u;
  }
  function formatNumber(n){
    const rounded = Math.round(n*100)/100;
    return Number.isInteger(rounded) ? String(rounded) : String(rounded).replace('.', ',');
  }
  function combineAmounts(a, b){
    const pa = parseAmount(a), pb = parseAmount(b);
    const va = parseFloat(String(pa.value).replace(',', '.'));
    const vb = parseFloat(String(pb.value).replace(',', '.'));
    if(!isNaN(va) && !isNaN(vb) && pa.unit.toLowerCase() === pb.unit.toLowerCase()){
      const sum = formatNumber(va + vb);
      return formatAmount(sum, pa.unit);
    }
    if(!a) return b; if(!b) return a;
    return a + ' + ' + b;
  }

  function allCategories(){
    const set = new Set([...DEFAULT_CATEGORIES, ...state.meta.customCategories]);
    state.week.items.forEach(i => set.add(i.category || 'Sonstiges'));
    state.pantry.forEach(p => set.add(p.category || 'Sonstiges'));
    const ordered = DEFAULT_CATEGORIES.filter(c => set.has(c));
    const extra = [...set].filter(c => !DEFAULT_CATEGORIES.includes(c)).sort();
    return [...ordered, ...extra];
  }

  function mergeItems(items){
    const map = new Map();
    for(const raw of items){
      const name = String(raw.name||'').trim();
      if(!name) continue;
      const category = normalizeCategory(String(raw.category||'').trim()) || resolveProduct(name).category;
      const key = normalize(name);
      if(map.has(key)){
        const existing = map.get(key);
        existing.amount = combineAmounts(existing.amount, raw.amount);
      } else {
        map.set(key, { id: uid(), name, amount: String(raw.amount||'').trim(), category, done:false, order: Date.now() });
      }
    }
    return Array.from(map.values());
  }

  function trackProduct(name, amount, category){
    const key = normalize(name);
    state.meta.frequent[key] = (state.meta.frequent[key] || 0) + 1;
    state.meta.recent = [{ name, amount: amount||'', category: category||'Sonstiges', ts: Date.now() },
      ...state.meta.recent.filter(r => normalize(r.name) !== key)].slice(0, 12);
    persistMeta();
  }

  function toggleFavorite(name){
    const key = normalize(name);
    const idx = state.meta.favorites.findIndex(f => normalize(f) === key);
    if(idx >= 0) state.meta.favorites.splice(idx, 1);
    else state.meta.favorites.push(name);
    persistMeta();
    haptic('light');
  }
  function isFavorite(name){ return state.meta.favorites.some(f => normalize(f) === normalize(name)); }

  function importFromJSON(text, append){
    let data;
    try{ data = JSON.parse(text); }
    catch(e){ return { ok:false, error:'Ungültiges JSON – bitte Format prüfen.' }; }
    if(!data || !Array.isArray(data.items)) return { ok:false, error:'Kein "items"-Array im JSON gefunden.' };
    const merged = mergeItems(data.items);
    const pantryKeys = state.pantry.map(p => normalize(p.name));
    const kept = [], filtered = [];
    for(const it of merged){
      const n = normalize(it.name);
      const isPantry = pantryKeys.some(pk => pk && (n.includes(pk) || pk.includes(n)));
      if(isPantry) filtered.push(it); else kept.push(it);
    }
    if(append){
      const combined = mergeItems([...state.week.items.filter(i => !i.done), ...kept]);
      state.week.items = [...combined, ...state.week.items.filter(i => i.done)];
      if(data.week) state.week.label = String(data.week);
    } else {
      state.week = { label: String(data.week||''), items: kept };
      state.filteredOut = filtered;
    }
    kept.forEach(it => trackProduct(it.name, it.amount, it.category));
    persistWeek();
    return { ok:true, keptCount: kept.length, filteredCount: filtered.length };
  }

  const app = document.getElementById('app');

  function esc(s){
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function groupByCategory(items){
    const groups = {};
    items.forEach(it => {
      const cat = normalizeCategory(it.category || resolveProduct(it.name).category);
      if(!groups[cat]) groups[cat] = [];
      groups[cat].push(it);
    });
    const cats = DEFAULT_CATEGORIES.filter(c => groups[c]);
    const extra = Object.keys(groups).filter(c => !DEFAULT_CATEGORIES.includes(c)).sort();
    return [...cats, ...extra].map(cat => ({ cat, items: groups[cat].sort((a,b) => (a.order||0) - (b.order||0)) }));
  }

  function filterItems(items){
    const q = normalize(state.ui.inputQuery);
    if(!q) return items;
    return items.filter(i => normalize(i.name).includes(q) || normalize(i.category).includes(q));
  }

  function sortItems(items){
    if(state.ui.sortMode === 'name') return [...items].sort((a,b) => a.name.localeCompare(b.name, 'de'));
    if(state.ui.sortMode === 'recent') return [...items].sort((a,b) => (b.order||0) - (a.order||0));
    return items;
  }

  function progressStats(){
    const total = state.week.items.length;
    const done = state.week.items.filter(i => i.done).length;
    const pct = total ? Math.round((done / total) * 100) : 0;
    return { total, done, remaining: total - done, pct };
  }

  function itemRowHTML(item){
    const icon = getFoodIcon(item.name, item.category, item.icon);
    return `
      <li class="item-tile row-wrap" data-id="${item.id}">
        <div class="row-actions">
          <button class="row-action-btn delete" data-action="deleteItem" data-id="${item.id}">${ICONS.trash}</button>
        </div>
        <div class="row-content ${item.done?'done':''}" data-id="${item.id}" data-action="toggle">
          <div class="emoji-wrap">${icon}</div>
          <div class="row-text">
            <div class="row-name">${esc(item.name)}</div>
            ${item.amount ? `<div class="row-amount">${esc(item.amount)}</div>` : ''}
          </div>
          <div class="check-circle">${ICONS.check}</div>
        </div>
      </li>`;
  }

  function renderListeTab(){
    const activeItems = groupByCategory(state.week.items.filter(i => !i.done)).flatMap(g => g.items);
    const doneItems = state.week.items.filter(i => i.done);
    const groups = groupByCategory(state.week.items.filter(i => !i.done));
    const stats = progressStats();
    let html = '';

    if(stats.total > 0){
      html += `<div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:${stats.pct}%"></div></div>
        <div class="progress-label"><span>${stats.done} von ${stats.total} erledigt</span><span>${stats.pct}%</span></div>
      </div>`;
    }

    if(state.filteredOut.length){
      html += `<div class="filtered-note">
        <span>${state.filteredOut.length} Artikel aus Vorrat gefiltert</span>
        <button data-action="showFiltered">Anzeigen</button>
      </div>`;
    }

    if(!activeItems.length && !doneItems.length){
      html += `<div class="empty-state">
        <div class="empty-icon">${ICONS.cart}</div>
        <h3>Deine Einkaufsliste</h3>
        <p>Füge Produkte unten hinzu oder importiere deinen Wochenplan.</p>
        <div class="empty-actions">
          <button class="btn btn-primary" data-action="openImport" style="flex:none;padding:12px 20px;">Importieren</button>
        </div>
      </div>`;
    } else {
      if(activeItems.length){
        groups.forEach((g, i) => {
          if(!g.items.length) return;
          html += `<div class="category-block" data-tone="${i % 6}">
            <h3 class="category-heading">${esc(g.cat)}</h3>
            <ul class="item-tiles">`;
          html += g.items.map(it => itemRowHTML(it)).join('');
          html += `</ul></div>`;
        });
      }

      if(doneItems.length){
        html += `<div class="done-toggle" data-action="toggleDoneSection">
          <span>Erledigt</span><span class="count-badge">${doneItems.length}</span>
        </div>`;
        if(state.ui.doneOpen){
          html += `<div class="category-block done-section" style="opacity:.85">
            <ul class="item-tiles">`;
          html += doneItems.map(it => itemRowHTML(it)).join('');
          html += `</ul></div>`;
        }
      }
    }
    return html;
  }

  }

  function renderHeader(){
    const tab = state.ui.tab;
    if(tab === 'liste'){
      const stats = progressStats();
      const sub = state.week.label ? `Woche ${state.week.label}` : (stats.total ? `${stats.remaining} offen` : 'Bereit zum Einkaufen');
      return `<header class="screen-header">

        <h1 class="screen-title">Einkaufsliste</h1>
        <p class="screen-subtitle">${esc(sub)}</p>
      </header>`;

  function toast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => t.classList.remove('show'), 2000);
  }

  function addItem(name, amount, category, merge, icon){
    name = String(name||'').trim();
    if(!name) return false;
    const resolved = resolveProduct(name);
    category = normalizeCategory(String(category||'').trim()) || resolved.category;
    icon = icon || resolved.icon;
    amount = String(amount||'').trim();
    if(!allCategories().includes(category) && !state.meta.customCategories.includes(category))
      state.meta.customCategories.push(category);
    const key = normalize(name);
    if(merge){
      const existing = state.week.items.find(i => !i.done && normalize(i.name) === key);
      if(existing){ existing.amount = combineAmounts(existing.amount, amount); existing.order = Date.now(); existing.icon = icon || existing.icon; }
      else state.week.items.unshift({ id: uid(), name, amount, category, icon, done:false, order: Date.now() });
    } else {
      state.week.items.unshift({ id: uid(), name, amount, category, done:false, order: Date.now() });
    }
    trackProduct(name, amount, category);
    persistWeek(); persistMeta();
    haptic('light');
    return true;
  }

  function updateItem(id, data){
    const item = state.week.items.find(i => i.id === id);
    if(!item) return;
    if(data.name) item.name = data.name.trim();
    if(data.category){
      item.category = data.category.trim();
      if(!state.meta.customCategories.includes(item.category) && !DEFAULT_CATEGORIES.includes(item.category))
        state.meta.customCategories.push(item.category);
    }
    if(data.amount !== undefined) item.amount = data.amount.trim();
    item.order = Date.now();
    trackProduct(item.name, item.amount, item.category);
    persistWeek(); persistMeta();
    haptic('light');
  }

  function markDone(id){
    const row = app.querySelector(`.row-content[data-id="${id}"]`);
    if(row) row.classList.add('exiting');
    setTimeout(() => {
      const item = state.week.items.find(i => i.id === id);
      if(item){ item.done = true; persistWeek(); render(); haptic('success'); toast('Erledigt'); }
    }, row ? 280 : 0);
  }
  function unmarkDone(id){
    const item = state.week.items.find(i => i.id === id);
    if(item){ item.done = false; item.order = Date.now(); persistWeek(); render(); haptic('light'); }
  }
  function deleteItem(id){
    state.week.items = state.week.items.filter(i => i.id !== id);
    persistWeek(); render(); haptic('medium'); toast('Gelöscht');
  }

  function openItemSheet(id){
    const item = id ? state.week.items.find(i => i.id === id) : null;
    const parsed = parseAmount(item ? item.amount : '');
    const cats = allCategories();
    const catOptions = cats.map(c => `<option value="${esc(c)}" ${item && item.category===c?'selected':''}>${esc(c)}</option>`).join('');
    const unitOptions = UNITS.map(u => `<option value="${esc(u)}" ${parsed.unit===u?'selected':''}>${u||'–'}</option>`).join('');
    closeSheets();
    const div = document.createElement('div');
    div.id = 'itemSheet';
    div.className = 'sheet-backdrop';
    div.innerHTML = `
      <div class="sheet" role="dialog">
        <div class="sheet-handle"></div>
        <button class="close-x" data-action="closeSheet">${ICONS.close}</button>
        <h2>${item ? 'Artikel bearbeiten' : 'Artikel hinzufügen'}</h2>
        <p class="hint">${item ? 'Name, Menge und Kategorie anpassen.' : 'Neues Produkt zur Einkaufsliste hinzufügen.'}</p>
        <div class="field"><label>Name</label><input type="text" id="itemName" value="${esc(item?item.name:'')}" placeholder="z.B. Tomaten" /></div>
        <div class="field-row">
          <div class="field"><label>Menge</label><input type="text" id="itemValue" inputmode="decimal" value="${esc(parsed.value)}" placeholder="500" /></div>
          <div class="field"><label>Einheit</label><select id="itemUnit">${unitOptions}</select></div>
        </div>
        <div class="field"><label>Kategorie</label>
          <select id="itemCategory">${catOptions}</select>
        </div>
        <div class="field"><label>Eigene Kategorie</label>
          <input type="text" id="itemCustomCat" placeholder="Optional: neue Kategorie" />
        </div>
        ${item ? `<div class="sheet-actions"><button class="btn btn-danger" data-action="deleteItem" data-id="${item.id}">Löschen</button></div>` : ''}
        <div class="sheet-actions">
          <button class="btn btn-secondary" data-action="closeSheet">Abbrechen</button>
          <button class="btn btn-primary" data-action="saveItem" data-id="${item?item.id:''}">Speichern</button>
        </div>
      </div>`;
    div.addEventListener('click', e => { if(e.target === div) closeSheets(); });
    document.body.appendChild(div);
    document.getElementById('itemName').focus();
  }

  function saveItem(id){
    const name = document.getElementById('itemName').value.trim();
    const value = document.getElementById('itemValue').value.trim();
    const unit = document.getElementById('itemUnit').value;
    let category = document.getElementById('itemCategory').value;
    const custom = document.getElementById('itemCustomCat').value.trim();
    if(custom) category = custom;
    if(!name){ toast('Bitte Name eingeben'); return; }
    const amount = formatAmount(value, unit);
    if(id) updateItem(id, { name, amount, category });
    else { addItem(name, amount, category, true); toast('Hinzugefügt'); }
    closeSheets(); render();
  }

  function openImportSheet(){
    closeSheets();
    const div = document.createElement('div');
    div.id = 'importSheet';
    div.className = 'sheet-backdrop';
    div.innerHTML = `
      <div class="sheet">
        <div class="sheet-handle"></div>
        <button class="close-x" data-action="closeSheet">${ICONS.close}</button>
        <h2>Wochenplan importieren</h2>
        <p class="hint">JSON aus deinem Essensplan-Chat einfügen.</p>
        <div class="field"><textarea id="importText" placeholder='{"week":"2026-07-06","items":[{"name":"Tomaten","amount":"500g","category":"Obst & Gemüse"}]}'></textarea></div>
        <div class="error-msg" id="importError"></div>
        <div class="sheet-actions">
          <button class="btn btn-secondary" data-action="closeSheet">Abbrechen</button>
          <button class="btn btn-secondary" data-action="doImport" data-append="1">Anhängen</button>
          <button class="btn btn-primary" data-action="doImport">Ersetzen</button>
        </div>
      </div>`;
    div.addEventListener('click', e => { if(e.target === div) closeSheets(); });
    document.body.appendChild(div);
  }

  function doImport(append){
    const text = document.getElementById('importText').value.trim();
    const errEl = document.getElementById('importError');
    if(!text){ errEl.textContent = 'Bitte JSON einfügen.'; return; }
    const result = importFromJSON(text, append);
    if(!result.ok){ errEl.textContent = result.error; return; }
    closeSheets(); render();
    toast(`${result.keptCount} Artikel ${append?'hinzugefügt':'importiert'}`);
    haptic('success');
  }

  function showFilteredSheet(){
    closeSheets();
    const div = document.createElement('div');
    div.id = 'filteredSheet';
    div.className = 'sheet-backdrop';
    const rows = state.filteredOut.map(it => `
      <div class="pantry-row">
        <span class="name">${getFoodIcon(it.name,it.category)}${esc(it.name)} ${it.amount?'· '+esc(it.amount):''}</span>
        <button data-action="restoreFiltered" data-id="${it.id}">${ICONS.plus}</button>
      </div>`).join('');
    div.innerHTML = `<div class="sheet"><div class="sheet-handle"></div>
      <button class="close-x" data-action="closeSheet">${ICONS.close}</button>
      <h2>Aus Vorrat gefiltert</h2><p class="hint">Automatisch entfernte Artikel – einzeln zurückholen.</p>
      <div class="card">${rows}</div></div>`;
    div.addEventListener('click', e => { if(e.target === div) closeSheets(); });
    document.body.appendChild(div);
  }

  function updateKeyboardLayout(){
    const vv = window.visualViewport;
    if(!vv) return;
    const offset = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
    const open = offset > 50;
    document.body.classList.toggle('keyboard-open', open);
    document.documentElement.style.setProperty('--keyboard-offset', open ? offset + 'px' : '0px');
    document.documentElement.style.setProperty('--visual-vh', vv.height + 'px');
  }

  function setupKeyboard(){
    updateKeyboardLayout();
    if(window.visualViewport){
      window.visualViewport.addEventListener('resize', updateKeyboardLayout);
      window.visualViewport.addEventListener('scroll', updateKeyboardLayout);
    }
    document.addEventListener('focusin', e => {
      if(e.target.matches('input, textarea, select')){
        setTimeout(() => {
          updateKeyboardLayout();
          e.target.scrollIntoView({ block:'center', behavior:'smooth' });
        }, 280);
      }
    });
    document.addEventListener('focusout', () => {
      setTimeout(updateKeyboardLayout, 100);
    });
  }

  let openSwipeRow = null;
  function closeAllSwipes(){
    if(openSwipeRow){
      const c = openSwipeRow.querySelector('.row-content');
      if(c){ c.style.transform = 'translateX(0)'; c.style.transition = 'transform .2s ease'; }
      openSwipeRow = null;
    }
  }

  function attachSwipeHandlers(){
    app.querySelectorAll('.row-wrap').forEach(wrap => {
      const content = wrap.querySelector('.row-content');
      if(!content || content.dataset.swipeBound) return;
      content.dataset.swipeBound = '1';
      content.style.transform = 'translateX(0)';
      let startX = 0, currentX = 0, dragging = false, opened = false;
      const actionWidth = 80;
      function onStart(e){
        if(e.target.closest('[data-drag-handle], .row-menu-btn, .check-circle')) return;
        closeAllSwipes();
        startX = (e.touches ? e.touches[0].clientX : e.clientX);
        dragging = true;
        content.style.transition = 'none';
      }
      function onMove(e){
        if(!dragging) return;
        const x = (e.touches ? e.touches[0].clientX : e.clientX);
        let delta = x - startX;
        if(opened) delta -= actionWidth;
        delta = Math.max(-actionWidth, Math.min(0, delta));
        currentX = delta;
        content.style.transform = `translateX(${delta}px)`;
      }
      function onEnd(){
        if(!dragging) return;
        dragging = false;
        content.style.transition = 'transform .2s ease';
        if(currentX < -40){
          content.style.transform = `translateX(-${actionWidth}px)`;
          opened = true;
          openSwipeRow = wrap;
        } else {
          content.style.transform = 'translateX(0)';
          opened = false;
          if(openSwipeRow === wrap) openSwipeRow = null;
        }
      }
      content.addEventListener('touchstart', onStart, {passive:true});
      content.addEventListener('touchmove', onMove, {passive:true});
      content.addEventListener('touchend', onEnd);
    });
  }

  function closeSheets(){
    ['itemSheet','importSheet','filteredSheet','listMenuSheet'].forEach(id => {
      const el = document.getElementById(id); if(el) el.remove();
    });
    document.querySelectorAll('.menu-popover').forEach(el => el.remove());
  }

  function showItemMenu(id, x, y){
    document.querySelectorAll('.menu-popover').forEach(el => el.remove());
    const item = state.week.items.find(i => i.id === id);
    if(!item) return;
    const pop = document.createElement('div');
    pop.className = 'menu-popover';
    pop.style.left = Math.min(x, window.innerWidth - 200) + 'px';
    pop.style.top = Math.min(y, window.innerHeight - 180) + 'px';
    pop.innerHTML = `
      <button data-action="editItem" data-id="${id}">${ICONS.edit} Bearbeiten</button>
      <button data-action="toggleFavorite" data-name="${esc(item.name)}">${ICONS.star} ${isFavorite(item.name)?'Favorit entfernen':'Als Favorit'}</button>
      <button class="danger" data-action="deleteItem" data-id="${id}">${ICONS.trash} Löschen</button>`;
    document.body.appendChild(pop);
    setTimeout(() => document.addEventListener('click', function closePop(ev){
      if(!pop.contains(ev.target)) { pop.remove(); document.removeEventListener('click', closePop); }
    }), 0);
  }

  function showListMenu(){
    closeSheets();
    const div = document.createElement('div');
    div.id = 'listMenuSheet';
    div.className = 'sheet-backdrop';
    div.innerHTML = `<div class="sheet"><div class="sheet-handle"></div>
      <button class="close-x" data-action="closeSheet">${ICONS.close}</button>
      <h2>Listen-Aktionen</h2>
      <div class="settings-group" style="margin-top:12px">
        <div class="settings-row" data-action="openImport"><div class="settings-icon">${ICONS.import}</div><div class="settings-text"><div class="settings-label">Importieren</div></div><span class="settings-chevron">${ICONS.chevron}</span></div>
        <div class="settings-row" data-action="shareList"><div class="settings-icon">${ICONS.share}</div><div class="settings-text"><div class="settings-label">Teilen</div></div><span class="settings-chevron">${ICONS.chevron}</span></div>
        <div class="settings-row" data-action="duplicateList"><div class="settings-icon">${ICONS.copy}</div><div class="settings-text"><div class="settings-label">Duplizieren</div></div><span class="settings-chevron">${ICONS.chevron}</span></div>
        <div class="settings-row" data-action="clearDone"><div class="settings-icon">${ICONS.trash}</div><div class="settings-text"><div class="settings-label">Erledigte entfernen</div></div><span class="settings-chevron">${ICONS.chevron}</span></div>
      </div></div>`;
    div.addEventListener('click', e => { if(e.target === div) closeSheets(); });
    document.body.appendChild(div);
  }

  async function shareList(){
    const items = state.week.items.filter(i => !i.done);
    const text = items.map(i => `• ${i.name}${i.amount?' ('+i.amount+')':''}`).join('\n');
    const title = state.week.label ? `Einkaufsliste Woche ${state.week.label}` : 'Einkaufsliste';
    if(navigator.share){
      try{ await navigator.share({ title, text }); haptic('light'); return; }catch(e){}
    }
    try{
      await navigator.clipboard.writeText(title + '\n\n' + text);
      toast('In Zwischenablage kopiert');
      haptic('light');
    }catch(e){ toast('Teilen nicht verfügbar'); }
  }

  function duplicateList(){
    const copy = state.week.items.map(i => ({ ...i, id: uid(), done:false, order: Date.now() }));
    state.week = { label: state.week.label ? state.week.label + ' (Kopie)' : 'Kopie', items: copy };
    persistWeek(); render(); toast('Liste dupliziert'); haptic('success');
  }

  function clearDone(){
    const n = state.week.items.filter(i => i.done).length;
    state.week.items = state.week.items.filter(i => !i.done);
    persistWeek(); closeSheets(); render();
    toast(n ? `${n} erledigte entfernt` : 'Keine erledigten Artikel');
  }

  function attachDragHandlers(){
    app.querySelectorAll('[data-sortable="1"]').forEach(list => {
      if(list.dataset.dragBound) return;
      list.dataset.dragBound = '1';
      let dragId = null, dragEl = null;
      list.querySelectorAll('.row-wrap').forEach(row => {
        const handle = row.querySelector('[data-drag-handle]');
        if(!handle) return;
        handle.addEventListener('touchstart', e => {
          dragId = row.dataset.id;
          dragEl = row;
          row.querySelector('.row-content').classList.add('dragging');
          haptic('light');
        }, {passive:true});
      });
      list.addEventListener('touchmove', e => {
        if(!dragEl) return;
        const touch = e.touches[0];
        const target = document.elementFromPoint(touch.clientX, touch.clientY);
        const targetRow = target && target.closest('.row-wrap');
        if(targetRow && targetRow !== dragEl && list.contains(targetRow))
          list.insertBefore(dragEl, targetRow);
      }, {passive:true});
      list.addEventListener('touchend', () => {
        if(!dragEl) return;
        dragEl.querySelector('.row-content').classList.remove('dragging');
        const ids = [...list.querySelectorAll('.row-wrap')].map(r => r.dataset.id);
        ids.forEach((id, idx) => {
          const item = state.week.items.find(i => i.id === id);
          if(item) item.order = idx;
        });
        dragId = null; dragEl = null;
        persistWeek();
      });
    });
  }

  function addPantryItem(){
    const input = document.getElementById('pantryInput');
    const select = document.getElementById('pantryCategory');
    const name = input.value.trim();
    if(!name) return;
    state.pantry.push({ id: uid(), name, category: select.value });
    state.ui.addPantryCategory = select.value;
    persistPantry(); render(); toast('Zum Vorrat hinzugefügt'); haptic('light');
  }
  function removePantryItem(id){
    state.pantry = state.pantry.filter(p => p.id !== id);
    persistPantry(); render(); haptic('light');
  }
  function restoreFilteredItem(id){
    const it = state.filteredOut.find(i => i.id === id);
    if(!it) return;
    state.week.items.push(it);
    state.filteredOut = state.filteredOut.filter(i => i.id !== id);
    persistWeek(); closeSheets(); render(); toast('Zurück zur Liste');
  }

  function resetAll(){
    if(!confirm('Wirklich alle Daten löschen?')) return;
    [KEYS.week, KEYS.pantry, KEYS.settings, KEYS.meta].forEach(k => localStorage.removeItem(k));
    state.week = { label:'', items:[] };
    state.pantry = defaultPantry();
    state.filteredOut = [];
    state.settings = migrateSettings({ theme:'dark' });
    state.meta = { favorites:[], recent:[], frequent:{}, customCategories:[] };
    persistWeek(); persistPantry(); persistSettings(); persistMeta();
    render(); toast('Zurückgesetzt');
  }

  document.addEventListener('click', function(e){
    const target = e.target.closest('[data-action]');
    if(!target) return;
    const action = target.getAttribute('data-action');
    const id = target.getAttribute('data-id');

    switch(action){
      case 'tab': state.ui.tab = target.getAttribute('data-tab'); haptic('light'); render(); break;
      case 'toggle': {
        const item = state.week.items.find(i => i.id === id);
        if(!item) return;
        item.done ? unmarkDone(id) : markDone(id);
        break;
      }
      case 'deleteItem': deleteItem(id); closeSheets(); break;
      case 'editItem': closeSheets(); openItemSheet(id); break;
      case 'itemMenu': {
        const rect = target.getBoundingClientRect();
        showItemMenu(id, rect.left, rect.bottom + 4);
        break;
      }
      case 'toggleDoneSection': state.ui.doneOpen = !state.ui.doneOpen; render(); break;
      case 'openImport': openImportSheet(); break;
      case 'closeSheet': closeSheets(); break;
      case 'saveItem': saveItem(id || ''); break;
      case 'doImport': doImport(target.getAttribute('data-append') === '1'); break;
      case 'showFiltered': showFilteredSheet(); break;
      case 'restoreFiltered': restoreFilteredItem(id); break;
      case 'addPantry': addPantryItem(); break;
      case 'removePantry': removePantryItem(id); break;
      case 'setTheme': state.settings.theme = target.getAttribute('data-theme'); persistSettings(); render(); haptic('light'); break;
      case 'toggleHaptics': state.settings.haptics = !state.settings.haptics; persistSettings(); render(); haptic('medium'); break;
      case 'toggleRecent': state.settings.showRecent = !state.settings.showRecent; persistSettings(); render(); break;
      case 'toggleFrequent': state.settings.showFrequent = !state.settings.showFrequent; persistSettings(); render(); break;
      case 'setSort': state.ui.sortMode = target.getAttribute('data-sort'); render(); haptic('light'); break;
      case 'quickAdd': {
        const inp = document.getElementById('quickInput');
        if(inp && inp.value.trim()){
          const r = resolveProduct(inp.value.trim());
          addItem(r.name, '', r.category, true, r.icon);
          state.ui.inputQuery = ''; state.ui.autocompleteOpen = false;
          render(); toast('Hinzugefügt');
        }
        break;
      }
      case 'pickProduct':
        addItem(target.getAttribute('data-name'), '', target.getAttribute('data-category'), true, target.getAttribute('data-icon'));
        state.ui.inputQuery = ''; state.ui.autocompleteOpen = false;
        render(); toast('Hinzugefügt'); haptic('light'); break;
      case 'quickAddSuggestion':
        addItem(target.getAttribute('data-name'), target.getAttribute('data-amount'), target.getAttribute('data-category'), true);
        render(); toast('Hinzugefügt'); break;
      case 'toggleFavorite':
        toggleFavorite(target.getAttribute('data-name'));
        document.querySelectorAll('.menu-popover').forEach(el => el.remove());
        render(); break;
      case 'shareList': closeSheets(); shareList(); break;
      case 'duplicateList': closeSheets(); duplicateList(); break;
      case 'listMenu': showListMenu(); break;
      case 'clearDone': clearDone(); break;
      case 'resetAll': resetAll(); break;
    }
  });

  function refreshAutocomplete(){
    const wrap = document.querySelector('.quick-bar-wrap');
    if(!wrap || state.ui.tab !== 'liste') return;
    const ac = renderAutocomplete();
    let dd = document.getElementById('autocompleteDropdown');
    if(!dd){
      wrap.insertAdjacentHTML('afterbegin', `<div id="autocompleteDropdown" class="autocomplete-dropdown ${ac?'open':''}">${ac}</div>`);
    } else {
      dd.className = 'autocomplete-dropdown' + (ac ? ' open' : '');
      dd.innerHTML = ac;
    }
  }

  document.addEventListener('input', function(e){
    if(e.target.id === 'quickInput'){
      state.ui.inputQuery = e.target.value;
      state.ui.autocompleteOpen = !!e.target.value.trim();
      refreshAutocomplete();
    }
  });

  document.addEventListener('focusin', function(e){
    if(e.target.id === 'quickInput' && e.target.value.trim()){
      state.ui.autocompleteOpen = true;
      refreshAutocomplete();
    }
  });

  document.addEventListener('keydown', function(e){
    if(e.target.id === 'quickInput' && e.key === 'Enter'){
      e.preventDefault();
      const val = e.target.value.trim();
      if(val){
        const r = resolveProduct(val);
        addItem(r.name, '', r.category, true, r.icon);
        state.ui.inputQuery = ''; state.ui.autocompleteOpen = false;
        render(); toast('Hinzugefügt');
      }
    }
  });

  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('gesturechange', e => e.preventDefault());
  document.addEventListener('gestureend', e => e.preventDefault());

  function migrateWeekItems(){
    let changed = false;
    state.week.items.forEach(it => {
      const resolved = resolveProduct(it.name);
      const cat = normalizeCategory(it.category);
      if(cat !== it.category || (!it.icon && resolved.icon)){ it.category = cat; it.icon = it.icon || resolved.icon; changed = true; }
    });
    if(changed) persistWeek();
  }

  setupKeyboard();
  buildProductIndex();
  migrateWeekItems();
  render();
})();

</script>
</body>
</html>
